name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Go tests
        run: npm run test:go

      - name: Build frontend
        run: npm run build
