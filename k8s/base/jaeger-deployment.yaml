apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-jaeger
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: k8s-ops-jaeger
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ops-jaeger
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.58
          imagePullPolicy: IfNotPresent
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
