apiVersion: v1
kind: Secret
metadata:
  name: k8s-ops-secret
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
type: Opaque
stringData:
  # Optional: base64 kubeconfig payload for real-cluster mode.
  KUBECONFIG_DATA: ""

  # Optional: provider key for openai-compatible assistant mode.
  ASSISTANT_API_KEY: ""

  # Optional: PagerDuty integration key for alert dispatch.
  PAGERDUTY_ROUTING_KEY: ""
