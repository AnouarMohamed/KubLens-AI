apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-operations-dashboard
  namespace: kubernetes-operations-dashboard
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: dashboard
          envFrom:
            - configMapRef:
                name: k8s-ops-config
            - secretRef:
                name: k8s-ops-secret
                optional: false
