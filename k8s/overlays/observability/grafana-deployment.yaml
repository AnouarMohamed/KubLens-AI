apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-grafana
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: k8s-ops-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ops-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
      volumes:
        - name: datasources
          configMap:
            name: k8s-ops-grafana-datasources
        - name: dashboards
          configMap:
            name: k8s-ops-grafana-dashboards
