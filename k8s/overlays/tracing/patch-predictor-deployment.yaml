apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-predictor
  namespace: kubernetes-operations-dashboard
spec:
  template:
    spec:
      containers:
        - name: predictor
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "k8s-ops-jaeger:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "kubelens-predictor"
            - name: OTEL_TRACES_SAMPLE_RATIO
              value: "1"
