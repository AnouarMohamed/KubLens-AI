apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-predictor
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: k8s-ops-predictor
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-predictor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ops-predictor
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      containers:
        - name: predictor
          # Replace this with your published predictor image.
          image: k8s-ops-predictor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
