apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-operations-dashboard
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-operations-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-operations-dashboard
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      containers:
        - name: dashboard
          # Replace this with your published image tag.
          image: kubernetes-operations-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: k8s-ops-config
            - secretRef:
                name: k8s-ops-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /api/cluster-info
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/cluster-info
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
