apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ops-config
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
data:
  PORT: "3000"
  DIST_DIR: "dist"
  KUBECONFIG_CONTEXTS: ""
  PREDICTOR_BASE_URL: "http://k8s-ops-predictor:8001"
  PREDICTOR_TIMEOUT_SECONDS: "4"
  ASSISTANT_PROVIDER: "none"
  ASSISTANT_TIMEOUT_SECONDS: "8"
  ASSISTANT_API_BASE_URL: "https://api.openai.com/v1"
  ASSISTANT_MODEL: ""
  ASSISTANT_TEMPERATURE: "0.2"
  ASSISTANT_MAX_TOKENS: "700"
  AUTH_ENABLED: "false"
  AUTH_TOKENS: ""
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "300"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  TERMINAL_ENABLED: "true"
  TERMINAL_ALLOWED_PREFIXES: "kubectl,helm,kustomize,echo,pwd,ls,dir"
  AUDIT_LOG_FILE: ""
  AUDIT_MAX_ITEMS: "500"
  ALERT_TIMEOUT_SECONDS: "5"
  ALERTMANAGER_WEBHOOK_URL: ""
  SLACK_WEBHOOK_URL: ""
  PAGERDUTY_EVENTS_URL: "https://events.pagerduty.com/v2/enqueue"
